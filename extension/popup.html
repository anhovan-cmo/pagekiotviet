<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Auto Post</title>
  <style>
    body { font-family: Arial, sans-serif; width: 300px; padding: 10px; }
    input { width: 100%; margin-bottom: 10px; padding: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #1877f2; color: white; border: none; cursor: pointer; border-radius: 5px; }
    button:hover { background: #166fe5; }
    #status { margin-top: 10px; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <h3>Cấu hình KiotViet</h3>
  <input type="text" id="retailer" placeholder="Tên gian hàng (VD: mystore)">
  <input type="text" id="clientId" placeholder="Client ID">
  <input type="password" id="clientSecret" placeholder="Client Secret">
  
  <button id="startBtn">1. Lấy SP & Mở Facebook</button>
  <p id="status"></p>

  <script src="popup.js"></script>
</body>
</html>
